name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Test
        run: CGO_ENABLED=0 go test -v ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/audbookdl
